name: Fetch VGC Meta Teams

on:
  schedule:
    # Runs at 10:00 UTC (07:00 AM BRT) every 2 days
    - cron: '0 10 */2 * *'
  workflow_dispatch: # Allow manual trigger via UI

permissions:
  contents: write

jobs:
  fetch-vgc-teams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch VGC Teams
        run: npm run update-vgc-teams
        env:
            PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
            PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/vgc-teams.json
          git diff --staged --quiet || git commit -m "chore: update vgc meta teams [skip ci]" && git push
