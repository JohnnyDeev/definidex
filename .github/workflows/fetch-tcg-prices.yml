name: Fetch TCG Prices

on:
  schedule:
    # Runs at 09:00 UTC (06:00 AM BRT) every 3 days
    - cron: '0 9 */3 * *'
  workflow_dispatch: # Allow manual trigger via UI

permissions:
  contents: write

jobs:
  fetch-tcg-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch TCG Prices
        run: npm run update-tcg-prices
        env:
          VITE_POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/tcg-prices.json
          git diff --staged --quiet || git commit -m "chore: update cached TCG prices [skip ci]" && git push
