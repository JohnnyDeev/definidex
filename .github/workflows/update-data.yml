name: Update DefiniDEX Data

on:
  schedule:
    # VGC Update: Every Monday at 3:00 AM UTC (weekly - meta doesn't change daily)
    - cron: '0 3 * * 1'
    # TCG Prices Update: Daily at 4:00 AM UTC (daily for fresh prices)
    - cron: '0 4 * * *'
    # News Update: Daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of data to update'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - vgc
          - tcg
          - news

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update VGC Data
        if: github.event.inputs.update_type == 'all' || github.event.inputs.update_type == 'vgc' || github.event_name == 'schedule'
        run: |
          echo "Updating VGC data..."
          npm run update-vgc-teams || echo "VGC update failed, continuing..."
          npm run fetch-vgc || echo "VGC fetch failed, continuing..."

      - name: Update TCG Prices
        if: github.event.inputs.update_type == 'all' || github.event.inputs.update_type == 'tcg' || github.event_name == 'schedule'
        run: |
          echo "Updating TCG prices..."
          npm run update-tcg-prices || echo "TCG update failed, continuing..."

      - name: Update News
        if: github.event.inputs.update_type == 'all' || github.event.inputs.update_type == 'news' || github.event_name == 'schedule'
        run: |
          echo "Updating news..."
          npm run fetch-news || echo "News update failed, continuing..."

      - name: Update metadata timestamps
        run: |
          node -e "
            const fs = require('fs');
            const metadata = {
              lastUpdated: new Date().toISOString(),
              vgc: { lastUpdated: new Date().toISOString(), source: 'smogon' },
              tcg: { lastUpdated: new Date().toISOString(), source: 'pokemontcg' },
              news: { lastUpdated: new Date().toISOString(), source: 'rss' }
            };
            fs.writeFileSync('public/data/metadata.json', JSON.stringify(metadata, null, 2));
          "

      - name: Check for changes
        id: git-check
        run: |
          git add public/data/ src/data/
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "chore: auto-update data $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: Create Pull Request (if there are changes)
        if: steps.git-check.outputs.changes == 'true' && github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: auto-update data'
          branch: auto-update/data-${{ github.run_id }}
          title: 'chore: auto-update data'
          body: |
            Automated data update from GitHub Actions.
            
            Updated:
            - VGC Meta Data
            - TCG Prices
            - News Feed
            
            Generated at: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
          delete-branch: true
